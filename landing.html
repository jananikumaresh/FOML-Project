<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sleep Quality Predictor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animate.css (FIXED LINK) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    overflow: hidden;
    transition: 0.5s;

}

/* DARK MODE */
.dark {
    background: #121212;
}

/* Toggle */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 22px;
    cursor: pointer;
}

/* HERO */
.main {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

/* ICON */
.icon {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    backdrop-filter: blur(10px);
    animation: float 3s infinite;
    box-shadow: 0 0 40px rgba(255,255,255,0.3);
}

/* TEXT */
h1 {
    margin-top: 30px;
    font-size: 42px;
    font-weight: 600;
}
.highlight {
    color: #ffeaa7;
}

p {
    max-width: 500px;
    margin-top: 15px;
    font-size: 16px;
    opacity: 0.9;
}

/* BUTTON */
.btn-custom {
    margin-top: 35px;
    padding: 15px 35px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 500;
    border: none;
    background: linear-gradient(to right,#ff7eb3,#ff758c);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}
.btn-custom:hover {
    transform: scale(1.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

/* FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* PARTICLES */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: move 10s linear infinite;
}
@keyframes move {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- Dark Mode Toggle -->
<div class="toggle" onclick="toggleMode()">🌙</div>

<!-- Floating Particles -->
<script>
for(let i=0;i<30;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<!-- MAIN -->
<div class="main animate__animated animate__fadeIn">

<div class="icon animate__animated animate__zoomIn">🌙</div>

<h1>
Sleep Quality <br>
<span class="highlight">Predictor</span>
</h1>

<p>
Discover how your habits affect your sleep and get AI-powered insights for better rest.
</p>

<a href="/assessment">
<button class="btn-custom">🚀 Get Started</button>
</a>

</div>

<script>
function toggleMode(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
